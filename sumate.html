<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Página de registro para el Movimiento Somos+. Únete a nosotros por una Cuba democrática y próspera.">
    <title>Súmate - Somos+</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>
    <header class="header">
        <div class="header__container container">
            <a href="./" class="header__logo">
                <img src="./assets/logo-icon.jpg" alt="Logo Somos+" width="32" height="32">
                <span>Somos+</span>
            </a>
            <nav class="header__nav" style="display: flex; align-items: center; gap: 1.5rem; white-space: nowrap;">
        <a href="./blog.html" class="nav__link">Blog</a>
        <a href="./somos.html" class="nav__link">Somos</a>
        <a href="./clubes.html" class="nav__link">Clubes</a>
        <a href="./documentos.html" class="nav__link">Documentos</a>
        <a href="https://erp.somosmascuba.com/accounts/login/" class="nav__link">Portal</a>
        <a href="./sumate.html" class="nav__cta--join" style="text-decoration: none;">SÚMATE</a>
        <a href="./colabora.html" class="nav__cta--donate" style="text-decoration: none;">COLABORA</a>
        <div style="display: flex; align-items: center; gap: 0.5rem; background: rgba(0,0,0,0.05); padding: 0.3rem 0.8rem; border-radius: 2rem;">
            <a href="./sumate.html" class="nav__link" style="padding: 0; color: var(--accent-orange); font-weight: 700;">ES</a>
            <span style="opacity: 0.3;">|</span>
            <a href="./sumate-en.html" class="nav__link" style="padding: 0; color: var(--white); opacity: 0.6;">EN</a>
        </div>
      </nav>
        </div>
    </header>

    <main class="container">
        <section class="registration">
            <div class="registration__visual">
                <img src="./assets/header_v2.png" alt="Somos+ Movement" class="registration__visual-img">
                <div class="registration__visual-overlay"></div>
                <div class="registration__quote">
                    <blockquote>"El cambio no es una promesa, es nuestra acción colectiva."</blockquote>
                    <cite>Somos el presente</cite>
                </div>
            </div>

            <div class="registration__content">
                <h1 class="registration__title">Súmate al cambio</h1>
                <p class="registration__subtitle">Completa tu registro para empezar a colaborar.</p>

                <form id="registration-form" class="form">
                    <div class="form__row--two">
                        <div class="form__group">
                            <label for="nombre" class="form__label">Nombre y Apellidos *</label>
                            <input type="text" id="nombre" name="nombre" class="form__input" required>
                        </div>
                        <div class="form__group">
                            <label for="email" class="form__label">Email *</label>
                            <input type="email" id="email" name="email" class="form__input" required>
                        </div>
                    </div>

                    <div class="form__row--two">
                        <div class="form__group">
                            <label for="telefono" class="form__label">Teléfono/WhatsApp (con código de país) *</label>
                            <input type="tel" id="telefono" name="telefono" class="form__input" required>
                        </div>
                        <div class="form__group">
                            <label for="ciudad" class="form__label">Ciudad / Lugar de Residencia Actual *</label>
                            <input type="text" id="ciudad" name="ciudad" class="form__input" required>
                        </div>
                    </div>

                    <div class="form__row--two">
                        <div class="form__group">
                            <label for="profesion" class="form__label">Profesión / Oficio / Habilidades *</label>
                            <input type="text" id="profesion" name="profesion" class="form__input" required>
                        </div>
                        <div class="form__group">
                            <label for="grupo_trabajo" class="form__label">¿En qué grupo de trabajo te gustaría
                                insertarte?</label>
                            <select id="grupo_trabajo" name="grupo_trabajo" class="form__select">
                                <option value="">Selecciona grupo de trabajo</option>
                                <option value="diseno_programacion">Diseño y Programación</option>
                                <option value="comunicadores_redes">Comunicadores y Activistas en Redes</option>
                                <option value="finanzas">Finanzas (Recaudación de Fondos)</option>
                                <option value="logistica">Logística</option>
                                <option value="derechos_humanos">Derechos Humanos / Legal</option>
                                <option value="activismo">Activismo y movilización ciudadana</option>
                            </select>
                        </div>
                    </div>

                    <div class="form__group">
                        <label for="ayuda" class="form__label">¿De qué manera podrías ayudar tú con nuestro objetivo
                            hoy?</label>
                        <textarea id="ayuda" name="ayuda" class="form__textarea"></textarea>
                    </div>

                    <div class="form__row--two">
                        <div class="form__group">
                            <label for="twitter" class="form__label">Perfil de Twitter (X) (Opcional)</label>
                            <input type="text" id="twitter" name="twitter" class="form__input"
                                placeholder="@usuario o URL">
                        </div>
                        <div class="form__group">
                            <label for="facebook" class="form__label">Perfil de Facebook (Opcional)</label>
                            <input type="text" id="facebook" name="facebook" class="form__input"
                                placeholder="URL del perfil">
                        </div>
                    </div>

                    <div class="form__group">
                        <label class="form__label">¿Qué idiomas dominas?</label>
                        <div class="form__checkbox-group">
                            <label class="form__checkbox-item"><input type="checkbox" name="idioma" value="español">
                                Español</label>
                            <label class="form__checkbox-item"><input type="checkbox" name="idioma" value="ingles">
                                Inglés</label>
                            <label class="form__checkbox-item"><input type="checkbox" name="idioma" value="frances">
                                Francés</label>
                            <label class="form__checkbox-item"><input type="checkbox" name="idioma" value="otro">
                                Otros</label>
                        </div>
                    </div>

                    <div class="form__group">
                        <label for="motivacion" class="form__label">¿Por qué quieres unirte a nosotros? *</label>
                        <textarea id="motivacion" name="motivacion" class="form__textarea" required></textarea>
                    </div>

                    <div class="form__row--two">
                        <div class="form__group">
                            <label class="form__label">¿Cómo prefieres que te contactemos?</label>
                            <div class="form__checkbox-group" style="flex-direction: column;">
                                <label class="form__checkbox-item"><input type="checkbox" name="relacion" value="email">
                                    Email</label>
                                <label class="form__checkbox-item"><input type="checkbox" name="relacion"
                                        value="whatsapp"> WhatsApp</label>
                                <label class="form__checkbox-item"><input type="checkbox" name="relacion"
                                        value="telegram"> Telegram</label>
                                <label class="form__checkbox-item"><input type="checkbox" name="relacion"
                                        value="llamada"> Llamada</label>
                            </div>
                        </div>
                        <div class="form__group">
                            <label class="form__label">Deseo suscribirme a:</label>
                            <div class="form__checkbox-group" style="flex-direction: column;">
                                <label class="form__checkbox-item"><input type="checkbox" name="suscripcion"
                                        value="boletin"> Boletín semanal</label>
                                <label class="form__checkbox-item"><input type="checkbox" name="suscripcion"
                                        value="noticias"> Noticias de Última Hora</label>
                                <label class="form__checkbox-item"><input type="checkbox" name="suscripcion"
                                        value="clubes"> Actualizaciones de mi Club Local</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="form__button" style="width: 100%; margin-top: 2rem;">ÚNETE
                        AHORA</button>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer__container container">
            <p>&copy; 2024 Movimiento Somos+ - Por una Cuba libre y próspera.</p>
            <div class="footer__social" style="display: flex; gap: 2rem; justify-content: center;">
                <a href="https://www.facebook.com/somosmascuba" target="_blank"><i class="fa-brands fa-facebook"></i></a>
                <a href="https://x.com/somosmascuba" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
                <a href="https://plus.google.com/b/107272004533022617651/107272004533022617651" target="_blank"><i class="fa-brands fa-google-plus-g"></i></a>
                <a href="https://www.youtube.com/somosmascubaoficial" target="_blank"><i class="fa-brands fa-youtube"></i></a>
                <a href="https://instagram.com/somosmascuba" target="_blank"><i class="fa-brands fa-instagram"></i></a>
                <a href="mailto:info@somosmascuba.com"><i class="fa-solid fa-envelope"></i></a>
            </div>
        </div>
    </footer>

    <script src="./main.js" type="module"></script>
</body>

</html>
