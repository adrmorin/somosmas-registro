    <main class="container">
        <section class="registration">
            <div class="registration__visual">
                <img src="/somosmas-registro/assets/header_v2-PegH8h4O.png" alt="Somos+ Movement" class="registration__visual-img">
                <div class="registration__visual-overlay"></div>
                <div class="registration__quote">
                    <blockquote>"Change is not a promise, it is our collective action."</blockquote>
                    <cite>We are the present</cite>
                </div>
            </div>

            <div class="registration__content">
                <h1 class="registration__title">Join the Change</h1>
                <p class="registration__subtitle">Complete your registration to start collaborating.</p>

                <form id="registration-form" class="form">
                    <div class="form__row--two">
                        <div class="form__group">
                            <label for="nombre" class="form__label">Full Name *</label>
                            <input type="text" id="nombre" name="nombre" class="form__input" required>
                        </div>
                        <div class="form__group">
                            <label for="email" class="form__label">Email *</label>
                            <input type="email" id="email" name="email" class="form__input" required>
                        </div>
                    </div>

                    <div class="form__row--two">
                        <div class="form__group">
                            <label for="password" class="form__label">Password *</label>
                            <input type="password" id="password" name="password" class="form__input" required minlength="8">
                        </div>
                        <div class="form__group">
                            <label for="confirm_password" class="form__label">Repeat Password *</label>
                            <input type="password" id="confirm_password" name="confirm_password" class="form__input" required minlength="8">
                        </div>
                    </div>

                    <div class="form__row--two">
                        <div class="form__group">
                            <label for="telefono" class="form__label">Phone/WhatsApp (with country code) *</label>
                            <input type="tel" id="telefono" name="telefono" class="form__input" required>
                        </div>
                        <div class="form__group">
                            <label for="ciudad" class="form__label">City / Current Place of Residence *</label>
                            <input type="text" id="ciudad" name="ciudad" class="form__input" required>
                        </div>
                    </div>

                    <div class="form__row--two">
                        <div class="form__group">
                            <label for="profesion" class="form__label">Profession / Trade / Skills *</label>
                            <input type="text" id="profesion" name="profesion" class="form__input" required>
                        </div>
                        <div class="form__group">
                            <label for="grupo_trabajo" class="form__label">Which working group would you like to join?</label>
                            <select id="grupo_trabajo" name="grupo_trabajo" class="form__select">
                                <option value="">Select working group</option>
                                <option value="diseno_programacion">Design & Programming</option>
                                <option value="comunicadores_redes">Communicators & Social Media Activists</option>
                                <option value="finanzas">Finance (Fundraising)</option>
                                <option value="logistica">Logistics</option>
                                <option value="derechos_humanos">Human Rights / Legal</option>
                                <option value="activismo">Activism and Citizen Mobilization</option>
                            </select>
                        </div>
                    </div>

                    <div class="form__group">
                        <label for="ayuda" class="form__label">In what way could you help with our objective today?</label>
                        <textarea id="ayuda" name="ayuda" class="form__textarea"></textarea>
                    </div>

                    <div class="form__row--two">
                        <div class="form__group">
                            <label for="twitter" class="form__label">Twitter (X) Profile (Optional)</label>
                            <input type="text" id="twitter" name="twitter" class="form__input"
                                placeholder="@username or URL">
                        </div>
                        <div class="form__group">
                            <label for="facebook" class="form__label">Facebook Profile (Optional)</label>
                            <input type="text" id="facebook" name="facebook" class="form__input"
                                placeholder="Profile URL">
                        </div>
                    </div>

                    <div class="form__group">
                        <label class="form__label">Which languages do you speak?</label>
                        <div class="form__checkbox-group">
                            <label class="form__checkbox-item"><input type="checkbox" name="idioma" value="español">
                                Spanish</label>
                            <label class="form__checkbox-item"><input type="checkbox" name="idioma" value="ingles">
                                English</label>
                            <label class="form__checkbox-item"><input type="checkbox" name="idioma" value="frances">
                                French</label>
                            <label class="form__checkbox-item"><input type="checkbox" name="idioma" value="otro">
                                Others</label>
                        </div>
                    </div>

                    <div class="form__group">
                        <label for="motivacion" class="form__label">Why do you want to join us? *</label>
                        <textarea id="motivacion" name="motivacion" class="form__textarea" required></textarea>
                    </div>

                    <div class="form__row--two">
                        <div class="form__group">
                            <label class="form__label">How do you prefer us to contact you?</label>
                            <div class="form__checkbox-group" style="flex-direction: column;">
                                <label class="form__checkbox-item"><input type="checkbox" name="relacion" value="email">
                                    Email</label>
                                <label class="form__checkbox-item"><input type="checkbox" name="relacion"
                                        value="whatsapp"> WhatsApp</label>
                                <label class="form__checkbox-item"><input type="checkbox" name="relacion"
                                        value="telegram"> Telegram</label>
                                <label class="form__checkbox-item"><input type="checkbox" name="relacion"
                                        value="llamada"> Phone Call</label>
                            </div>
                        </div>
                        <div class="form__group">
                            <label class="form__label">I wish to subscribe to:</label>
                            <div class="form__checkbox-group" style="flex-direction: column;">
                                <label class="form__checkbox-item"><input type="checkbox" name="suscripcion"
                                        value="boletin"> Weekly Newsletter</label>
                                <label class="form__checkbox-item"><input type="checkbox" name="suscripcion"
                                        value="noticias"> Breaking News</label>
                                <label class="form__checkbox-item"><input type="checkbox" name="suscripcion"
                                        value="clubes"> Local Club Updates</label>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="form__button" style="width: 100%; margin-top: 2rem;">JOIN NOW</button>
                </form>
            </div>
        </section>
